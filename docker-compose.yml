services:
  # Your Flask Soccer App
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env  # Loads your Sportradar API key and Google OAuth secrets
    environment:
      - FLASK_APP=backend/main.py
    volumes:
      - .:/app
    depends_on:
      - n8n

  # n8n Workflow Automation
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data: